name: 'Update schedule'

on:
  schedule:
    - cron: '0 22,10 * * *'
  workflow_dispatch:
    branches:
      - master
      - dev
      - gd

# ⚠️ 添加必要的权限：允许删除 workflow runs
permissions:
  actions: write
  contents: read

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    timeout-minutes: 120
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]
    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Check open_driver config
        id: check_driver
        run: |
          echo "OPEN_DRIVER=$(python -c '
          try:
            from utils.config import config
            open_driver = config.open_driver
          except:
            open_driver = False
          print(open_driver)')" >> $GITHUB_ENV

      - name: Set up Chrome
        if: env.OPEN_DRIVER == 'True'
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Download chrome driver
        if: env.OPEN_DRIVER == 'True'
        uses: nanasess/setup-chromedriver@master

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Install selenium
        if: env.OPEN_DRIVER == 'True'
        run: pipenv install selenium

      - name: Update
        run: pipenv run dev

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push --force
          fi

      # 🧹 新增：自动清理历史运行记录，只保留最近5次
      - name: Cleanup old workflow runs (keep last 5)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 请确认此文件名与你仓库中的实际文件名一致（通常为 update_schedule.yml）
          WORKFLOW_FILE="update_schedule.yml"
          KEEP=5

          echo "Fetching completed runs for workflow: $WORKFLOW_FILE"
          COMPLETED_RUN_IDS=$(gh run list --workflow="$WORKFLOW_FILE" --status completed --limit 100 --json databaseId --jq '.[].databaseId')

          if [ -n "$COMPLETED_RUN_IDS" ]; then
            TOTAL=$(echo "$COMPLETED_RUN_IDS" | wc -l)
            echo "Total completed runs: $TOTAL"

            if [ "$TOTAL" -gt "$KEEP" ]; then
              DELETE_IDS=$(echo "$COMPLETED_RUN_IDS" | tail -n +$((KEEP+1)))
              echo "Deleting runs older than the most recent $KEEP:"
              for ID in $DELETE_IDS; do
                echo "Deleting run $ID"
                gh run delete "$ID" || echo "Failed to delete $ID (maybe in progress or already deleted)"
              done
            else
              echo "No runs to delete, total ($TOTAL) <= keep ($KEEP)"
            fi
          else
            echo "No completed runs found."
          fi
