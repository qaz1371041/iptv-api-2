name: 'Update schedule'

on:
  schedule:
    - cron: '0 22,10 * * *'
  workflow_dispatch:
    branches:
      - master
      - dev
      - gd
jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    timeout-minutes: 120
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]
    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV
      - uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}
      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'
      - name: Check open_driver config
        id: check_driver
        run: |
          echo "OPEN_DRIVER=$(python -c '
          try:
            from utils.config import config
            open_driver = config.open_driver
          except:
            open_driver = False
          print(open_driver)')" >> $GITHUB_ENV
      - name: Set up Chrome
        if: env.OPEN_DRIVER == 'True'
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      - name: Download chrome driver
        if: env.OPEN_DRIVER == 'True'
        uses: nanasess/setup-chromedriver@master
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install pipenv
        run: pip3 install --user pipenv
      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy
      - name: Install selenium
        if: env.OPEN_DRIVER == 'True'
        run: pipenv install selenium
      - name: Update
        run: pipenv run dev
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push --force
          fi
      # 新增：清理旧的 workflow 运行记录，只保留最近的 5 条
      - name: Cleanup old workflow runs (keep only 5)
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = context.workflow;  // 当前 workflow 文件名
            const current_run_id = context.runId;

            console.log(`Fetching runs for workflow ${workflow_id}...`);
            let runs = [];
            let page = 1;
            const per_page = 100;
            let response;

            // 分页获取所有运行记录
            do {
              response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                per_page,
                page
              });
              runs = runs.concat(response.data.workflow_runs);
              page++;
            } while (response.data.workflow_runs.length === per_page);

            // 按创建时间降序排序（最新的在前）
            runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 保留前 5 条，删除其余
            const runsToDelete = runs.slice(5);
            console.log(`Total runs: ${runs.length}, keeping 5, deleting ${runsToDelete.length} runs.`);

            for (const run of runsToDelete) {
              // 避免误删当前正在运行的记录（虽然它应该在前 5 条内）
              if (run.id === current_run_id) {
                console.log(`Skipping current run ${run.id}`);
                continue;
              }
              console.log(`Deleting run ${run.id} from ${run.created_at}`);
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
            }
