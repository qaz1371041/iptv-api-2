name: 'Update schedule'

on:
  schedule:
    - cron: '0 22,10 * * *'
  workflow_dispatch:
    branches:
      - master
      - dev
      - gd

# 必须添加的权限，用于删除旧的 workflow runs
permissions:
  actions: write
  contents: read

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    timeout-minutes: 120
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]
    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Check open_driver config
        id: check_driver
        run: |
          echo "OPEN_DRIVER=$(python -c '
          try:
            from utils.config import config
            open_driver = config.open_driver
          except:
            open_driver = False
          print(open_driver)')" >> $GITHUB_ENV

      - name: Set up Chrome
        if: env.OPEN_DRIVER == 'True'
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Download chrome driver
        if: env.OPEN_DRIVER == 'True'
        uses: nanasess/setup-chromedriver@master

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Install selenium
        if: env.OPEN_DRIVER == 'True'
        run: pipenv install selenium

      - name: Update
        run: pipenv run dev

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push --force
          fi

      # ==================== 新增：自动清理历史记录，只保留最近5次 ====================
      - name: Cleanup old workflow runs (keep last 5)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ⚠️ 请根据你的实际工作流文件名修改下面这行（通常在 .github/workflows/ 目录下）
          WORKFLOW_FILE="update_schedule.yml"
          KEEP=5

          echo "🔍 开始清理工作流: $WORKFLOW_FILE"
          
          # 获取所有已完成运行的ID，若失败则跳过
          RUN_IDS=$(gh run list --workflow="$WORKFLOW_FILE" --status completed --limit 100 --json databaseId --jq '.[].databaseId' 2>/dev/null || true)
          
          if [ -z "$RUN_IDS" ]; then
            echo "✅ 没有找到已完成的历史运行记录，跳过清理。"
            exit 0
          fi

          # 统计总数
          TOTAL=$(echo "$RUN_IDS" | wc -l)
          echo "📊 已完成运行总数: $TOTAL"

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "✅ 运行记录总数 ($TOTAL) 未超过保留数 ($KEEP)，无需删除。"
            exit 0
          fi

          # 计算需要删除的ID（跳过前KEEP个）
          DELETE_IDS=$(echo "$RUN_IDS" | tail -n +$((KEEP+1)))

          echo "🗑️ 准备删除以下运行ID（共 $(echo "$DELETE_IDS" | wc -l) 个）:"
          echo "$DELETE_IDS"

          # 逐个删除，忽略单个删除失败
          for ID in $DELETE_IDS; do
            echo "正在删除 $ID ..."
            gh run delete "$ID" || echo "⚠️ 删除 $ID 失败，可能已不存在或权限不足，继续下一个。"
          done

          echo "✅ 清理完成。"
      # ============================================================================
